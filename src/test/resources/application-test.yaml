spring:
  datasource:
    url: jdbc:h2:mem:my_colony_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    contexts: test

management:
  prometheus:
    metrics:
      export:
        enabled: false
